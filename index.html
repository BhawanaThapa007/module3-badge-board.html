<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Mechanics Badge Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:#0a0618;min-height:100vh;padding:1.5rem 1rem;overflow-x:hidden}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confettiFall 2.5s ease-in forwards;pointer-events:none;z-index:999}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes starPop{0%{transform:scale(0.5)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.wrap{max-width:700px;margin:0 auto;position:relative;z-index:1}

.hero{border-radius:24px;background:linear-gradient(135deg,#1e0a4a 0%,#0a1a3a 50%,#1a0a30 100%);border:2px solid #3d2080;padding:2rem 1.5rem;margin-bottom:1.5rem;text-align:center;position:relative;overflow:hidden}
.hero-badge{display:inline-block;background:linear-gradient(135deg,#f5c518,#ff8c00);color:#1a0a00;font-size:11px;font-weight:900;padding:4px 14px;border-radius:99px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.08em}
.hero-title{font-size:28px;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:-0.5px}
.hero-mod{font-size:13px;color:#8a7ab8;margin-bottom:1.5rem;font-weight:600}
.stars-row{display:flex;justify-content:center;gap:10px;margin-bottom:1.25rem}
.star{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;transition:all 0.4s;border:2px solid transparent}
.star.lit{background:linear-gradient(135deg,#f5c518,#ff8c00);color:#fff;border-color:#f5c518;box-shadow:0 0 16px #f5c51888;animation:starPop 0.5s ease}
.star.dim{background:#1e1240;color:#3d2a6a;border-color:#2d1a5a}
.xp-row{display:flex;align-items:center;gap:12px;padding:0 0.5rem}
.xp-lbl{font-size:12px;font-weight:800;color:#8a7ab8;white-space:nowrap}
.xp-bg{flex:1;height:12px;background:#1e1240;border-radius:99px;overflow:hidden;border:1px solid #3d2080}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7c3aed,#f5c518,#ff6b6b);transition:width 0.8s cubic-bezier(.34,1.56,.64,1)}
.xp-pct{font-size:13px;font-weight:900;color:#f5c518;min-width:36px;text-align:right}

.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.bc{border-radius:20px;padding:1.25rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:2px solid;position:relative;overflow:hidden}
.bc:hover{transform:translateY(-4px)}
.bc.b0{background:linear-gradient(135deg,#2d0820,#1a0410);border-color:#8b2252}
.bc.b1{background:linear-gradient(135deg,#2d1a00,#1a0e00);border-color:#9a5500}
.bc.b2{background:linear-gradient(135deg,#002818,#001510);border-color:#0a6644}
.bc.b3{background:linear-gradient(135deg,#1a0840,#0e0428);border-color:#5030c0}
.bc.active-card.b0{border-color:#ff6b9d;box-shadow:0 0 0 3px #ff6b9d33,0 12px 32px #8b225266}
.bc.active-card.b1{border-color:#ffaa00;box-shadow:0 0 0 3px #ffaa0033,0 12px 32px #9a550066}
.bc.active-card.b2{border-color:#00d68f;box-shadow:0 0 0 3px #00d68f33,0 12px 32px #0a664466}
.bc.active-card.b3{border-color:#a78bfa;box-shadow:0 0 0 3px #a78bfa33,0 12px 32px #5030c066}
.bc.unlocked{border-color:#f5c518!important;box-shadow:0 0 0 3px #f5c51833,0 12px 32px #f5c51844!important}
.bcirc{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0}
.b0 .bcirc{background:linear-gradient(135deg,#ff6b9d,#c2185b);color:#fff}
.b1 .bcirc{background:linear-gradient(135deg,#ffaa00,#e65100);color:#fff}
.b2 .bcirc{background:linear-gradient(135deg,#00d68f,#00796b);color:#fff}
.b3 .bcirc{background:linear-gradient(135deg,#a78bfa,#5b21b6);color:#fff}
.bc.unlocked .bcirc{background:linear-gradient(135deg,#f5c518,#ff8c00);color:#fff;box-shadow:0 0 20px #f5c51866}
.brow{display:flex;align-items:center;gap:12px}
.bname{font-size:16px;font-weight:900;margin-bottom:2px}
.b0 .bname{color:#ff8ab8}.b1 .bname{color:#ffbb44}.b2 .bname{color:#44e8a8}.b3 .bname{color:#c4b5fd}
.bc.unlocked .bname{color:#f5c518}
.btag{font-size:11px;line-height:1.4;margin-bottom:8px;font-weight:600}
.b0 .btag{color:#9a4466}.b1 .btag{color:#9a6622}.b2 .btag{color:#228866}.b3 .btag{color:#6644aa}
.bpill{font-size:11px;font-weight:900;padding:4px 12px;border-radius:99px;display:inline-block;text-transform:uppercase;letter-spacing:0.05em}
.b0 .bpill{background:linear-gradient(135deg,#ff6b9d,#c2185b);color:#fff}
.b1 .bpill{background:linear-gradient(135deg,#ffaa00,#e65100);color:#fff}
.b2 .bpill{background:linear-gradient(135deg,#00d68f,#00796b);color:#fff}
.b3 .bpill{background:linear-gradient(135deg,#a78bfa,#5b21b6);color:#fff}
.bc.unlocked .bpill{background:linear-gradient(135deg,#f5c518,#ff8c00);color:#fff}

.tp{border-radius:20px;padding:1.5rem;margin-bottom:1.25rem;border:2px solid}
.tp.t0{background:linear-gradient(160deg,#2d0820,#18040e);border-color:#8b2252}
.tp.t1{background:linear-gradient(160deg,#2d1a00,#180e00);border-color:#9a5500}
.tp.t2{background:linear-gradient(160deg,#002818,#001510);border-color:#0a6644}
.tp.t3{background:linear-gradient(160deg,#1a0840,#0e0428);border-color:#5030c0}
.tp-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.tp-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.t0 .tp-icon{background:linear-gradient(135deg,#ff6b9d,#c2185b)}
.t1 .tp-icon{background:linear-gradient(135deg,#ffaa00,#e65100)}
.t2 .tp-icon{background:linear-gradient(135deg,#00d68f,#00796b)}
.t3 .tp-icon{background:linear-gradient(135deg,#a78bfa,#5b21b6)}
.thlbl{font-size:11px;font-weight:900;padding:4px 12px;border-radius:99px;text-transform:uppercase;letter-spacing:0.06em;color:#fff}
.t0 .thlbl{background:linear-gradient(135deg,#ff6b9d,#c2185b)}
.t1 .thlbl{background:linear-gradient(135deg,#ffaa00,#e65100)}
.t2 .thlbl{background:linear-gradient(135deg,#00d68f,#00796b)}
.t3 .thlbl{background:linear-gradient(135deg,#a78bfa,#5b21b6)}
.ttitle{font-size:15px;font-weight:800;margin-bottom:4px;line-height:1.4}
.t0 .ttitle{color:#ff8ab8}.t1 .ttitle{color:#ffbb44}.t2 .ttitle{color:#44e8a8}.t3 .ttitle{color:#c4b5fd}
.tnote{font-size:12px;margin-bottom:1.25rem;line-height:1.6;font-weight:600}
.t0 .tnote{color:#884466}.t1 .tnote{color:#886622}.t2 .tnote{color:#228866}.t3 .tnote{color:#6644aa}
.sbox{border-radius:12px;padding:12px 16px;margin-bottom:1.25rem;font-size:13px;line-height:1.7;font-weight:700;border-left:4px solid}
.t0 .sbox{background:#3d0e24;color:#ff8ab8;border-color:#ff6b9d}
.t1 .sbox{background:#3d2200;color:#ffbb44;border-color:#ffaa00}
.t2 .sbox{background:#003820;color:#44e8a8;border-color:#00d68f}
.t3 .sbox{background:#1e0e50;color:#c4b5fd;border-color:#a78bfa}

.mrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mterm{border-radius:10px;padding:8px 12px;font-size:13px;font-weight:800;min-width:90px;text-align:center}
.t0 .mterm{background:#3d0e24;color:#ff8ab8;border:2px solid #8b2252}
.t1 .mterm{background:#3d2200;color:#ffbb44;border:2px solid #9a5500}
.t2 .mterm{background:#003820;color:#44e8a8;border:2px solid #0a6644}
.t3 .mterm{background:#1e0e50;color:#c4b5fd;border:2px solid #5030c0}
.msel{flex:1;padding:9px 10px;font-size:12px;border-radius:10px;border:2px solid #333;background:#111;color:#aaa;font-family:'Nunito',Arial,sans-serif;font-weight:700}
.msel:focus{outline:none}
.mc{border-color:#00d68f!important;background:#003820!important;color:#44e8a8!important}
.mwrong{border-color:#ff4444!important;background:#2d0808!important;color:#ff8080!important}

.tfrow{margin-bottom:12px;padding:12px 14px;border-radius:12px;border:1px solid #222}
.t0 .tfrow{background:#200610}.t1 .tfrow{background:#201000}.t2 .tfrow{background:#001810}.t3 .tfrow{background:#100428}
.tfq{font-size:13px;line-height:1.6;margin-bottom:10px;font-weight:700}
.t0 .tfq{color:#ff8ab8}.t1 .tfq{color:#ffbb44}.t2 .tfq{color:#44e8a8}.t3 .tfq{color:#c4b5fd}
.tfbtns{display:flex;gap:8px}
.tfb{padding:8px 20px;font-size:13px;font-weight:800;border-radius:10px;border:2px solid #333;background:#111;color:#666;cursor:pointer;font-family:'Nunito',Arial,sans-serif;transition:all 0.15s}
.tfb:hover{background:#222;color:#aaa;border-color:#555}
.tfb.sel{background:#1e1240;border-color:#7c3aed;color:#c4b5fd}
.tfb.tc{background:#003820;color:#44e8a8;border-color:#00d68f}
.tfb.tw{background:#2d0808;color:#ff8080;border-color:#ff4444}

.srow{margin-bottom:12px}
.sgoal{font-size:13px;font-weight:800;border-radius:10px;padding:10px 14px;margin-bottom:8px;line-height:1.5}
.t0 .sgoal{background:#3d0e24;color:#ff8ab8;border:2px solid #8b2252}
.t1 .sgoal{background:#3d2200;color:#ffbb44;border:2px solid #9a5500}
.t2 .sgoal{background:#003820;color:#44e8a8;border:2px solid #0a6644}
.t3 .sgoal{background:#1e0e50;color:#c4b5fd;border:2px solid #5030c0}
.sopts{display:flex;flex-direction:column;gap:6px}
.sopt{padding:10px 14px;font-size:13px;border-radius:10px;border:2px solid #2a2040;background:#111;color:#666;cursor:pointer;text-align:left;font-family:'Nunito',Arial,sans-serif;font-weight:700;line-height:1.5;transition:all 0.15s;width:100%}
.sopt:hover{background:#1e1240;border-color:#7c3aed;color:#c4b5fd}
.sopt.ssel{background:#1e1240;border-color:#7c3aed;color:#c4b5fd}
.sopt.sc{background:#003820;color:#44e8a8;border-color:#00d68f;cursor:default}
.sopt.sw{background:#2d0808;color:#ff8080;border-color:#ff4444;cursor:default}
.sopt.sdim{opacity:0.25;cursor:default}

.mopt{padding:11px 14px;font-size:13px;border-radius:10px;border:2px solid #2a2040;background:#111;color:#666;cursor:pointer;margin-bottom:7px;display:flex;align-items:center;gap:10px;font-family:'Nunito',Arial,sans-serif;font-weight:700;text-align:left;width:100%;line-height:1.5;transition:all 0.15s}
.mopt:hover{background:#1e1240;border-color:#7c3aed;color:#c4b5fd}
.mopt.mchk{border-color:#a78bfa;background:#1e0840;color:#c4b5fd}
.mopt.mpc{background:#003820;color:#44e8a8;border-color:#00d68f;cursor:default}
.mopt.mpw{background:#2d0808;color:#ff8080;border-color:#ff4444;cursor:default}
.mcbox{width:20px;height:20px;border:2px solid #444;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.mopt.mchk .mcbox{background:#7c3aed;border-color:#a78bfa;color:#fff}
.mopt.mpc .mcbox{background:#00d68f;border-color:#00d68f;color:#fff}
.mopt.mpw .mcbox{background:#ff4444;border-color:#ff4444;color:#fff}

.sbtn{border-radius:14px;padding:12px 28px;font-size:15px;font-weight:900;cursor:pointer;margin-top:1.25rem;border:none;color:#fff;font-family:'Nunito',Arial,sans-serif;transition:transform 0.15s,box-shadow 0.15s;display:inline-block}
.sbtn:hover{transform:translateY(-2px)}
.sbtn:disabled{opacity:0.25;cursor:default;transform:none}
.t0 .sbtn{background:linear-gradient(135deg,#ff6b9d,#c2185b);box-shadow:0 4px 20px #ff6b9d44}
.t1 .sbtn{background:linear-gradient(135deg,#ffaa00,#e65100);box-shadow:0 4px 20px #ffaa0044}
.t2 .sbtn{background:linear-gradient(135deg,#00d68f,#00796b);box-shadow:0 4px 20px #00d68f44}
.t3 .sbtn{background:linear-gradient(135deg,#a78bfa,#5b21b6);box-shadow:0 4px 20px #a78bfa44}

.fb{border-radius:12px;padding:14px 16px;margin-top:1.25rem;font-size:13px;line-height:1.6;font-weight:700;border-left:4px solid}
.fbok{background:#003820;color:#44e8a8;border-color:#00d68f}
.fberr{background:#2d0808;color:#ff8080;border-color:#ff4444}

.cscreen{text-align:center;padding:2.5rem 1.5rem;background:linear-gradient(135deg,#1e0a4a,#0a1a3a);border-radius:24px;border:2px solid #3d2080}
.cbadges{display:flex;justify-content:center;gap:16px;margin:1.5rem 0;flex-wrap:wrap}
.cbadge{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#f5c518,#ff8c00);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;box-shadow:0 0 24px #f5c51866}
.rrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2d2060;text-align:left}
.rrow:last-child{border-bottom:none}
.rcirc{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f5c518,#ff8c00);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}

@media(max-width:500px){
  .bgrid{grid-template-columns:1fr}
  .hero-title{font-size:22px}
  .star{width:32px;height:32px;font-size:14px}
}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
const badges=[
  {id:0,L:'E',name:'Explorer',tag:'Identify core game mechanics',cl:'b0'},
  {id:1,L:'A',name:'Analyst',tag:'Evaluate mechanics critically',cl:'b1'},
  {id:2,L:'S',name:'Strategist',tag:'Match mechanics to learning goals',cl:'b2'},
  {id:3,L:'D',name:'Designer',tag:'Plan a gamified vocabulary unit',cl:'b3'}
];
const tasks=[
  {id:0,type:'match',title:'Match each game mechanic to its correct definition.',note:'Use the dropdowns to pair each term. All three must be correct to unlock the Explorer badge.',
   pairs:[{term:'Points',def:'Numerical rewards that accumulate to show learner progress'},{term:'Badges',def:'Visual awards given when learners reach specific milestones'},{term:'Narrative',def:'A storyline that gives context and meaning to learning tasks'}],
   defs:['Numerical rewards that accumulate to show learner progress','Visual awards given when learners reach specific milestones','A storyline that gives context and meaning to learning tasks']},
  {id:1,type:'tf',title:'True or False? Answer all three correctly.',note:'Read each statement carefully and select True or False.',
   qs:[
     {q:'Public leaderboards motivate all students equally, regardless of where they are ranked.',ans:false},
     {q:'Badges are most effective when tied to meaningful achievements, not just participation.',ans:true},
     {q:'Points alone are sufficient to maintain student motivation across a full vocabulary unit.',ans:false}
   ]},
  {id:2,type:'sel',title:'Choose the best mechanic for each classroom goal.',note:'Select the most appropriate game mechanic for each situation.',
   qs:[
     {g:'Students need to revisit vocabulary words multiple times across the week.',opts:['Public class leaderboard','Daily practice streaks rewarded with points','Single milestone badge at unit end'],ans:1},
     {g:'Several students disengage quickly when activities become challenging.',opts:['Timed elimination speed quiz','Narrative quest with gradually increasing challenge','Weekly peer ranking display'],ans:1},
     {g:'You want to visibly celebrate when a student masters 20 new words.',opts:['Point deductions for incorrect answers','Milestone badge awarded on word mastery','Team vs. team competition'],ans:1}
   ]},
  {id:3,type:'multi',title:'Assemble your gamification plan.',note:'Select exactly 2 mechanics that best fit this Nepal classroom scenario.',
   scenario:'You teach Grade 8 English in Nepal. Your students have mixed motivation levels. You want to encourage consistent effort and celebrate individual milestones — but avoid public shame for lower-performing students.',
   opts:[
     {tx:'Public class leaderboard projected on screen for all to see',ok:false},
     {tx:'Personal points tracker — each student sees only their own score',ok:true},
     {tx:'Milestone badges awarded when vocabulary targets are reached',ok:true},
     {tx:'Timed elimination round removing the lowest scorers each round',ok:false},
     {tx:'Weekly team vs. team competition board on the wall',ok:false}
   ]}
];

let unlocked=[false,false,false,false],active=null;
let S={0:{sel:['','',''],chk:false,ok:false},1:{ans:[null,null,null],chk:false,ok:false},2:{ans:[null,null,null],chk:false,ok:false},3:{sel:[],chk:false,ok:false}};

function confetti(){
  const colors=['#f5c518','#ff6b9d','#00d68f','#a78bfa','#ffaa00','#44e8a8','#ff8c00','#c4b5fd','#ff4444','#00bcd4'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.top='-20px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(6+Math.random()*10)+'px';
    el.style.height=(6+Math.random()*10)+'px';
    el.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    el.style.animationDelay=Math.random()*0.8+'s';
    el.style.borderRadius=Math.random()>0.5?'50%':'3px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

function render(){
  const root=document.getElementById('root');
  if(unlocked.every(Boolean)){root.innerHTML=renderDone();confetti();return;}
  const n=unlocked.filter(Boolean).length;
  const pct=Math.round((n/4)*100);
  let h=`<div class="hero">
    <div class="hero-badge">Module 3 · EFL Gamification</div>
    <p class="hero-title">Game Mechanics Badge Board</p>
    <p class="hero-mod">Complete all 4 challenges — earn every badge — become a Gamification Expert!</p>
    <div class="stars-row">${[0,1,2,3].map(i=>`<div class="star ${i<n?'lit':'dim'}">${i<n?'★':'☆'}</div>`).join('')}</div>
    <div class="xp-row">
      <span class="xp-lbl">XP</span>
      <div class="xp-bg"><div class="xp-fill" style="width:${pct}%"></div></div>
      <span class="xp-pct">${pct}%</span>
    </div>
  </div>
  <div class="bgrid">${badges.map(b=>renderBC(b)).join('')}</div>`;
  if(active!==null)h+=renderTP(active);
  root.innerHTML=h;
}

function renderBC(b){
  const u=unlocked[b.id],isA=active===b.id;
  return `<div class="bc ${b.cl}${isA?' active-card':''}${u?' unlocked':''}" onclick="setA(${b.id})">
    <div class="brow">
      <div class="bcirc">${u?'★':b.L}</div>
      <div>
        <p class="bname">${b.name}</p>
        <p class="btag">${b.tag}</p>
        <span class="bpill">${u?'Earned ★':'Locked'}</span>
      </div>
    </div>
  </div>`;
}

function renderTP(id){
  const t=tasks[id],b=badges[id],s=S[id],cl='t'+id;
  let body='';
  if(t.type==='match')body=renderMatch(t,s);
  else if(t.type==='tf')body=renderTF(t,s);
  else if(t.type==='sel')body=renderSel(t,s);
  else body=renderMulti(t,s);
  let canSub=false;
  if(!s.chk){if(t.type==='match')canSub=s.sel.every(v=>v!=='');else if(t.type==='tf')canSub=s.ans.every(v=>v!==null);else if(t.type==='sel')canSub=s.ans.every(v=>v!==null);else canSub=s.sel.length===2;}
  else if(!s.ok)canSub=true;
  const lbl=!s.chk?'Check My Answers →':s.ok?'Badge Earned! ★':'Try Again →';
  const fb=s.chk?(s.ok?`<div class="fb fbok">★ Badge unlocked! The <strong>${b.name}</strong> badge is yours!</div>`:`<div class="fb fberr">Not quite right. Review the highlighted answers and try again!</div>`):'';
  return `<div class="tp ${cl}">
    <div class="tp-header">
      <div class="tp-icon">${b.L}</div>
      <span class="thlbl">${b.name} badge challenge</span>
    </div>
    <p class="ttitle">${t.title}</p>
    <p class="tnote">${t.note}</p>
    ${t.type==='multi'?`<div class="sbox">${t.scenario}</div>`:''}
    ${body}${fb}
    ${!unlocked[id]?`<button class="sbtn" onclick="doCheck(${id})" ${canSub?'':'disabled'}>${lbl}</button>`:''}
  </div>`;
}

function renderMatch(t,s){
  return t.pairs.map((p,i)=>{
    const v=s.sel[i],cls=s.chk?(v===p.def?'mc':'mwrong'):'';
    return `<div class="mrow"><span class="mterm">${p.term}</span><span style="color:#555;font-size:16px;font-weight:900">→</span>
    <select class="msel ${cls}" onchange="upM(${i},this.value)" ${s.chk&&s.ok?'disabled':''}>
      <option value="">Choose a definition…</option>
      ${t.defs.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}
    </select></div>`;
  }).join('');
}

function renderTF(t,s){
  return t.qs.map((q,i)=>{
    const a=s.ans[i];
    function bc(bv){if(!s.chk)return a===bv?'tfb sel':'tfb';if(a===bv)return bv===q.ans?'tfb tc':'tfb tw';return 'tfb';}
    return `<div class="tfrow"><p class="tfq">${i+1}. ${q.q}</p><div class="tfbtns">
      <button class="${bc(true)}" onclick="upTF(${i},true)" ${s.chk&&s.ok?'disabled':''}>True</button>
      <button class="${bc(false)}" onclick="upTF(${i},false)" ${s.chk&&s.ok?'disabled':''}>False</button>
    </div></div>`;
  }).join('');
}

function renderSel(t,s){
  return t.qs.map((q,i)=>{
    const a=s.ans[i];
    return `<div class="srow"><p class="sgoal">${q.g}</p><div class="sopts">
      ${q.opts.map((o,j)=>{let cls='sopt';if(!s.chk){if(a===j)cls+=' ssel';}else{if(a===j)cls+=j===q.ans?' sc':' sw';else cls+=' sdim';}
      return `<button class="${cls}" onclick="upS(${i},${j})" ${s.chk?'disabled':''}>${o}</button>`;}).join('')}
    </div></div>`;
  }).join('');
}

function renderMulti(t,s){
  return t.opts.map((o,i)=>{
    const isSel=s.sel.includes(i);let cls='mopt';
    if(s.chk){if(isSel)cls+=o.ok?' mpc':' mpw';}else if(isSel)cls+=' mchk';
    const onclick=s.chk&&s.ok?'':` onclick="toggleM(${i})"`;
    return `<button class="${cls}"${onclick}><div class="mcbox">${isSel?'✓':''}</div><span>${o.tx}</span></button>`;
  }).join('');
}

function setA(id){active=active===id?null:id;render();}
function upM(i,v){S[0].sel[i]=v;S[0].chk=false;render();}
function upTF(i,v){if(S[1].chk&&S[1].ok)return;S[1].ans[i]=v;S[1].chk=false;render();}
function upS(i,j){if(S[2].chk&&S[2].ok)return;S[2].ans[i]=j;S[2].chk=false;render();}
function toggleM(i){
  if(S[3].chk&&S[3].ok)return;
  const idx=S[3].sel.indexOf(i);
  if(idx>=0)S[3].sel.splice(idx,1);else if(S[3].sel.length<2)S[3].sel.push(i);
  S[3].chk=false;render();
}
function doCheck(id){
  const s=S[id],t=tasks[id];
  if(s.chk&&!s.ok){s.chk=false;if(id===0)s.sel=['','',''];else if(id===1)s.ans=[null,null,null];else if(id===2)s.ans=[null,null,null];else s.sel=[];render();return;}
  s.chk=true;
  if(id===0)s.ok=t.pairs.every((p,i)=>s.sel[i]===p.def);
  else if(id===1)s.ok=t.qs.every((q,i)=>s.ans[i]===q.ans);
  else if(id===2)s.ok=t.qs.every((q,i)=>s.ans[i]===q.ans);
  else{const ci=t.opts.map((o,i)=>o.ok?i:-1).filter(x=>x>=0);s.ok=s.sel.length===2&&ci.every(i=>s.sel.includes(i));}
  if(s.ok){unlocked[id]=true;confetti();}
  render();
}

function renderDone(){
  return `<div class="cscreen">
    <p style="font-size:12px;color:#8a7ab8;text-transform:uppercase;letter-spacing:0.1em;font-weight:800;margin-bottom:8px">All 4 badges earned</p>
    <p style="font-size:30px;font-weight:900;color:#f5c518;margin-bottom:6px">You're a Gamification Expert! ★</p>
    <p style="font-size:14px;color:#8a7ab8;max-width:460px;margin:0 auto;line-height:1.7;font-weight:600">You can now identify, evaluate, select, and plan game mechanics for EFL vocabulary instruction. Apply these skills in your Gamification Planning Matrix!</p>
    <div class="cbadges">${badges.map(b=>`<div class="cbadge">${b.L}</div>`).join('')}</div>
    <div style="max-width:400px;margin:0 auto 2rem">
      ${badges.map(b=>`<div class="rrow">
        <div class="rcirc">${b.L}</div>
        <div><p style="margin:0;font-size:14px;font-weight:800;color:#f5c518">${b.name}</p>
        <p style="margin:0;font-size:12px;color:#8a7ab8;font-weight:600">${b.tag}</p></div>
      </div>`).join('')}
    </div>
    <button onclick="restart()" style="background:linear-gradient(135deg,#7c3aed,#f5c518);border:none;border-radius:14px;padding:13px 32px;font-size:15px;font-weight:900;color:#fff;cursor:pointer;font-family:'Nunito',Arial,sans-serif;box-shadow:0 4px 24px #7c3aed66">Play Again ★</button>
  </div>`;
}

function restart(){
  unlocked=[false,false,false,false];active=null;
  S={0:{sel:['','',''],chk:false,ok:false},1:{ans:[null,null,null],chk:false,ok:false},2:{ans:[null,null,null],chk:false,ok:false},3:{sel:[],chk:false,ok:false}};
  render();
}
render();
</script>
</body>
</html>
